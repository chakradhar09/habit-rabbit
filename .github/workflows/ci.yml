name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      NODE_ENV: test
      PORT: 5000
      MONGODB_URI: mongodb://127.0.0.1:27017/habit-rabbit-ci
      JWT_SECRET: ci-super-secret-key
      JWT_ISSUER: habit-rabbit
      JWT_AUDIENCE: habit-rabbit-client
      FRONTEND_URLS: http://127.0.0.1:5000,http://localhost:5000
      VERIFY_BASE_URL: http://127.0.0.1:5000/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start API server
        run: |
          npm start > server.log 2>&1 &
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:5000/api/health > /dev/null; then
              echo "API server is ready"
              exit 0
            fi
            sleep 2
          done
          echo "API server failed to start"
          cat server.log
          exit 1

      - name: Run sprint verification suites
        run: npm run verify:all

      - name: Upload server logs on failure
        if: failure()
        run: cat server.log
